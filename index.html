<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Worms Zone Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- UI Overlay -->
    <div id="ui-container">
        <div id="leaderboard">
            <h3>Leaderboard</h3>
            <ol id="leaderboard-list"></ol>
        </div>
        <div id="right-hud">
            <div id="score-display">Score: <span id="score-val">0</span></div>
            <button id="hud-restart-btn">Restart (R)</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen">
        <h2>GAME OVER</h2>
        <p>Your Score: <span id="final-score">0</span></p>
        <button id="respawn-btn">Respawn</button>
    </div>

    <!-- Mobile Virtual Joystick & Boost Button -->
    <div id="mobile-controls">
        <div id="joystick-zone">
            <div id="joystick-base">
                <div id="joystick-knob"></div>
            </div>
        </div>
        <button id="boost-btn">BOOST</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
